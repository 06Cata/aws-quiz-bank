name: aws-quiz-bank

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env.local
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_BASE_URL: ${WEB_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_APP_URL: ${WEB_APP_URL:-http://localhost:3000}
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://127.0.0.1:3000
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  sync-questions:
    profiles:
      - jobs
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env.local
    environment:
      QUIZ_EXAM: ${QUIZ_EXAM:-saa}
      QUESTIONS_DIR: /questions
    volumes:
      - ./questions:/questions:ro
    command:
      - python
      - -m
      - app.jobs.sync_local_questions
    restart: "no"
